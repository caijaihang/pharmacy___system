name: Build Android APK

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Windows EXE"]
    types: [completed]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          # 生成 gradlew
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          export PATH="/opt/gradle-8.4/bin:$PATH"
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Copy Python files to Chaquopy source
        run: |
          chmod +x copy_android_py.sh
          ./copy_android_py.sh

      - name: Build APK with Gradle
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "=== APK files ==="
          find . -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-system-android
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v1.0.${{ github.run_number }}
          name: "药房进货比较系统 Android v1.0.${{ github.run_number }}"
          body: |
            ## 药房进货比较系统 - Android 版
            - 安装 APK 到手机
            - 无需 Python 环境、无需浏览器
            - 包含所有网页端功能
            - 适用 Android 7.0 及以上
          files: android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Android APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | v1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建工具 | Chaquopy + Gradle |" >> $GITHUB_STEP_SUMMARY
