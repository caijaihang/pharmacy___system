name: Build Android APK

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Windows EXE"]
    types: [completed]

permissions:
  contents: write
  packages: read

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify JDK version
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libltdl-dev libsqlite3-dev \
            libbz2-dev libreadline-dev \
            python3-venv python3-dev
          pip install --upgrade pip buildozer cython virtualenv

      - name: Install Android SDK & accept licenses
        run: |
          mkdir -p ~/.buildozer/android/platform
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROIDNDK="$HOME/.buildozer/android/platform/android-ndk-r25c"

          # 下载 Android SDK command-line tools
          mkdir -p "$ANDROIDSDK/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d "$ANDROIDSDK/cmdline-tools"
          mv "$ANDROIDSDK/cmdline-tools/cmdline-tools" "$ANDROIDSDK/cmdline-tools/latest"

          # Buildozer 期望 sdkmanager 在 tools/bin/sdkmanager，创建兼容链接
          mkdir -p "$ANDROIDSDK/tools/bin"
          ln -sf "$ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager" "$ANDROIDSDK/tools/bin/sdkmanager"
          ln -sf "$ANDROIDSDK/cmdline-tools/latest/bin/avdmanager" "$ANDROIDSDK/tools/bin/avdmanager"

          export PATH="$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools:$ANDROIDSDK/tools/bin:$PATH"

          # 接受所有 license
          yes | sdkmanager --sdk_root="$ANDROIDSDK" --licenses

          # 安装必要组件
          sdkmanager --sdk_root="$ANDROIDSDK" "platforms;android-30" "build-tools;30.0.3" "platform-tools"

          echo "ANDROIDSDK=$ANDROIDSDK" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROIDNDK" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          export PATH="$JAVA_HOME/bin:$PATH"
          buildozer android debug 2>&1 | tee build.log
          echo "=== 查找 APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "未找到 APK"
        timeout-minutes: 80

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-system-android
          path: bin/*.apk
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v1.0.${{ github.run_number }}
          name: "药房进货比较系统 Android v1.0.${{ github.run_number }}"
          body: |
            ## 药房进货比较系统 - Android 版
            - 安装 `pharmacy-system-*.apk` 到手机
            - 无需 Python 环境、无需浏览器
            - 包含所有网页端功能
            - 适用 Android 7.0 及以上
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Android APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | v1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建工具 | Buildozer + python-for-android |" >> $GITHUB_STEP_SUMMARY
          echo "| 引导程序 | WebView |" >> $GITHUB_STEP_SUMMARY
          echo "| 下载 | 右侧 Releases 或下方 Artifacts |" >> $GITHUB_STEP_SUMMARY
