name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.8.10"

jobs:
  build:
    runs-on: windows-2019
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: ver
        shell: bash
        run: |
          echo "tag=v1.0.$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "ver=v1.0.$(git rev-list --count HEAD)-$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Setup Python with cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements-win.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win.txt pyinstaller

      - name: Build EXE
        run: pyinstaller pharmacy.spec --clean --noconfirm
        timeout-minutes: 25

      - name: Check output
        shell: bash
        run: |
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-system-win7-x64
          path: dist/药房进货比较系统.exe
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "药房进货比较系统 ${{ steps.ver.outputs.ver }}"
          body: |
            ## 药房进货比较系统 - Windows 桌面版
            - 双击 `药房进货比较系统.exe` 运行
            - 无需安装 Python、无需浏览器
            - 兼容 Windows 7 / 8 / 10 / 11
            - 版本: ${{ steps.ver.outputs.ver }}
          files: dist/药房进货比较系统.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 构建完成 ${{ steps.ver.outputs.ver }}" >> $env:GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $env:GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $env:GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ steps.ver.outputs.ver }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Python | ${{ env.PYTHON_VERSION }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| 下载 | 右侧 Releases 或下方 Artifacts |" >> $env:GITHUB_STEP_SUMMARY
