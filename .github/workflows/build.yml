name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller pharmacy.spec --clean --noconfirm

      - name: List dist contents
        run: |
          Get-ChildItem dist\ -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-system-win7-x64
          path: dist/药房进货比较系统.exe
          retention-days: 7

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "药房进货比较系统 v1.0.${{ github.run_number }}"
          body: |
            ## 药房进货比较系统 - Windows 桌面版
            - 双击 `药房进货比较系统.exe` 运行
            - 无需安装 Python、无需浏览器
            - 兼容 Windows 7 / 8 / 10 / 11
            - 构建时间: ${{ github.event.head_commit.timestamp }}
          files: dist/药房进货比较系统.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          Write-Output "## 构建完成 v1.0.${{ github.run_number }}" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| 项目 | 值 |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "|------|----|" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| 版本 | v1.0.${{ github.run_number }} |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Python | 3.8.10 |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| 构建环境 | Windows Server 2019 |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| 下载 | 右侧 Releases 或下方 Artifacts |" >> $env:GITHUB_STEP_SUMMARY
