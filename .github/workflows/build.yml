name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  PY_VER: "3.8.10"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wine and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 xvfb p7zip-full wget
          wine --version

      - name: Initialize Wine prefix
        run: |
          export WINEARCH=win64
          export WINEDEBUG=-all
          xvfb-run -a wine wineboot --init
          sleep 10

      - name: Download and extract embeddable Python
        run: |
          wget --show-progress -O python-embed.zip "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-embed-amd64.zip"
          ls -la python-embed.zip
          mkdir -p ~/.wine/drive_c/python38
          unzip -q python-embed.zip -d ~/.wine/drive_c/python38
          ls -la ~/.wine/drive_c/python38/

      - name: Enable pip for embeddable Python
        run: |
          PTH_FILE=$(ls ~/.wine/drive_c/python38/*._pth | head -1)
          sed -i 's/^#import site/import site/' "$PTH_FILE" || true
          cat "$PTH_FILE"

      - name: Install pip
        run: |
          wget -q https://bootstrap.pypa.io/pip/3.8/get-pip.py -O ~/.wine/drive_c/python38/get-pip.py
          xvfb-run -a wine C:\\python38\\python.exe C:\\python38\\get-pip.py
          xvfb-run -a wine C:\\python38\\python.exe -m pip --version

      - name: Install dependencies
        run: |
          xvfb-run -a wine C:\\python38\\python.exe -m pip install --upgrade pip
          xvfb-run -a wine C:\\python38\\python.exe -m pip install -r requirements-win.txt
          xvfb-run -a wine C:\\python38\\python.exe -m pip install pyinstaller==5.13.2
          xvfb-run -a wine C:\\python38\\python.exe -m PyInstaller --version

      - name: Build EXE with PyInstaller
        run: |
          xvfb-run -a wine C:\\python38\\python.exe -m PyInstaller pharmacy.spec --clean --noconfirm
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-system-win7-x64
          path: dist/药房进货比较系统.exe
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "药房进货比较系统 v1.0.${{ github.run_number }}"
          body: |
            ## 药房进货比较系统 - Windows 桌面版
            - 双击 `药房进货比较系统.exe` 运行
            - 无需安装 Python、无需浏览器
            - 兼容 Windows 7 / 8 / 10 / 11
          files: dist/药房进货比较系统.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 构建完成 v1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | v1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ env.PY_VER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建方式 | Ubuntu 24.04 + Wine 8.x + Embeddable Python |" >> $GITHUB_STEP_SUMMARY
          echo "| 下载 | 右侧 Releases 或下方 Artifacts |" >> $GITHUB_STEP_SUMMARY
